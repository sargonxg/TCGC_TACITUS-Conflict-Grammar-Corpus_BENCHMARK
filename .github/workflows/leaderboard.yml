name: leaderboard
on:
  pull_request:
    paths: ["submissions/**"]

permissions:
  contents: read
  pull-requests: write

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -e '.[dev]'
      - name: Validate submission manifest
        run: |
          SUBMISSION_DIR=$(git diff --name-only origin/main | grep "^submissions/" | head -1 | xargs -I{} dirname {})
          echo "Submission dir: $SUBMISSION_DIR"
          if [ -f "$SUBMISSION_DIR/submission.json" ]; then
            python -c "
          import json, jsonschema, pathlib
          schema = json.loads(pathlib.Path('schema/submission-v0.1.json').read_text())
          data = json.loads(pathlib.Path('$SUBMISSION_DIR/submission.json').read_text())
          jsonschema.Draft202012Validator(schema).validate(data)
          print('Submission manifest valid.')
          "
          fi
      - name: Score predictions
        id: score
        run: |
          PRED_FILE=$(find submissions -name "predictions.jsonl" | tail -1)
          if [ -n "$PRED_FILE" ]; then
            tcgc score "$PRED_FILE" items/v0.1-sample/ --out /tmp/scores.json
            tcgc report /tmp/scores.json > /tmp/report.md
            echo "report_path=/tmp/report.md" >> $GITHUB_OUTPUT
          else
            echo "No predictions.jsonl found" > /tmp/report.md
            echo "report_path=/tmp/report.md" >> $GITHUB_OUTPUT
          fi
      - name: Post score comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: /tmp/report.md
