name: Bug Report
description: Something broken in the harness, CLI, or scorer
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting. Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal command or code to reproduce.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: TCGC version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.1"
